name: kikikaikai
description: "品品団地（pinpin-danchi）- カルチャープラットフォーム"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  flutter_markdown: ^0.7.7
  url_launcher: ^6.3.1
  video_player: ^2.9.5
  just_audio: ^0.9.46
  audio_service: ^0.18.18
  audio_session: ^0.1.25
  rxdart: ^0.28.0
  intl: ^0.20.2
  flutter_lucide: ^1.11.0
  sqflite: ^2.4.2
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  sqflite_common_ffi: ^2.3.5

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - assets/branding/pinpin/
    - assets/branding/eye_catch/
    - assets/audio/radio_01.mp3
    - assets/audio/radio_02.mp3
    - assets/audio/radio_03.mp3
    - assets/audio/radio_04.mp3
    - assets/audio/radio_05.mp3
    - assets/audio/radio_06.mp3
    - assets/audio/radio_07.mp3
    - assets/video/
    - assets/banner/
    - assets/bg/
    - assets/avatar/
    - assets/tab/
